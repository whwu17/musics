
# -----
# Build

# Deployed as a GitHub Pages project site at https://whwu17.github.io/musics/,
# so the site lives under the "/musics" path. baseurl must match for absolute
# asset URLs (via the relative_url filter) to resolve correctly in production.
url: "https://whwu17.github.io"
baseurl: "/musics"

Timezone: Etc/UTC

collections:
  musics:
    output: true
    permalink: /:path/

paginate: 10
permalink: pretty

defaults:
  - scope:
      path: ""
      type: musics
    values:
      layout: music-page

# ---
# Jekyll Config

jekyll-archives:
  enabled:
    - categories

plugins:
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate
  - jekyll-redirect-from

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE

sass:
  sass_dir: .
  style: compressed
