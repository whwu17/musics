<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.8.0.js"></script>
    <title>CPlayer</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0b12" />
    <style>
        :root {
            --accent: #0a84ff;
            --accent-2: #bf5af2;
            --glass-blur: 52px;
            --glass-saturate: 185%;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-fill: rgba(255, 255, 255, 0.1);
            --glass-fill-strong: rgba(255, 255, 255, 0.14);
            --glass-highlight: rgba(255, 255, 255, 0.34);
            --glass-shadow: 0 10px 38px rgba(0, 0, 0, 0.2);
            --glass-inset: inset 0 0.5px 0 rgba(255, 255, 255, 0.42);
            --fsp-gutter: clamp(16px, 4.5vw, 32px);
            --fsp-radius: 22px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            height: 100%;
            background: #0b0b12;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Keep the (shadow-DOM) cplayer engine mounted but visually hidden;
           audio keeps playing while hidden. */
        #app {
            position: fixed;
            width: 1px;
            height: 1px;
            left: -9999px;
            top: -9999px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        #fsp {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #fsp-bg {
            position: absolute;
            inset: -12%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) saturate(195%) brightness(0.78);
            transform: scale(1.12);
            transition: background-image 0.8s ease;
            z-index: 0;
        }

        #fsp-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 18%, rgba(10, 132, 255, 0.14), transparent 44%),
                radial-gradient(circle at 80% 72%, rgba(191, 90, 242, 0.1), transparent 42%),
                radial-gradient(circle at 50% 100%, rgba(0, 0, 0, 0.32), rgba(8, 8, 14, 0.62));
        }

        #fsp-liquid {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        #fsp-liquid span {
            position: absolute;
            border-radius: 50%;
            filter: blur(56px);
            opacity: 0.34;
            animation: liquid-drift 22s ease-in-out infinite;
        }

        #fsp-liquid span:nth-child(1) {
            width: 38vw;
            height: 38vw;
            top: -6%;
            left: -4%;
            background: rgba(10, 132, 255, 0.22);
        }

        #fsp-liquid span:nth-child(2) {
            width: 32vw;
            height: 32vw;
            right: -6%;
            bottom: 10%;
            background: rgba(191, 90, 242, 0.16);
            animation-delay: -7s;
            animation-duration: 26s;
        }

        #fsp-liquid span:nth-child(3) {
            width: 24vw;
            height: 24vw;
            left: 40%;
            top: 54%;
            background: rgba(100, 210, 255, 0.14);
            animation-delay: -13s;
            animation-duration: 30s;
        }

        @keyframes liquid-drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(2vw, -1.5vh) scale(1.03); }
        }

        #fsp-glass {
            background: var(--glass-fill);
            background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.13) 0%, rgba(255, 255, 255, 0.02) 32%, transparent 100%);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 0.5px solid var(--glass-border);
            box-shadow: var(--glass-inset), var(--glass-shadow);
        }

        #fsp-main {
            position: relative;
            z-index: 1;
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(24px, 6vw, 90px);
            padding: 3vh var(--fsp-gutter) 10px;
            min-height: 0;
        }

        /* Album art / vinyl */
        #fsp-art-wrap {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #fsp-art {
            position: relative;
            width: clamp(180px, 34vh, 360px);
            height: clamp(180px, 34vh, 360px);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            box-shadow:
                var(--glass-inset),
                0 0 0 10px rgba(255, 255, 255, 0.06),
                0 28px 70px rgba(0, 0, 0, 0.38);
            overflow: hidden;
            animation: spin 18s linear infinite;
            animation-play-state: paused;
        }

        #fsp-art::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.42) 0%, transparent 38%, transparent 62%, rgba(255, 255, 255, 0.1) 100%);
            pointer-events: none;
            z-index: 2;
        }

        #fsp-art.playing { animation-play-state: running; }

        #fsp-art::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22%;
            height: 22%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: rgba(8, 8, 16, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 0 6px rgba(255, 255, 255, 0.12);
            z-index: 3;
        }

        #fsp-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Text + lyrics */
        #fsp-side {
            flex: 1 1 460px;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: min(62vh, 520px);
            padding: clamp(16px, 3vw, 22px);
            border-radius: var(--fsp-radius);
        }

        #fsp-title-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 6px;
        }

        #fsp-title {
            font-size: clamp(22px, 3.4vw, 36px);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            flex: 1 1 auto;
            min-width: 0;
        }

        #fsp-info-btn {
            flex: 0 0 auto;
            margin-top: 4px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.06));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            opacity: 0.9;
            box-shadow: var(--glass-inset);
            transition: opacity 0.2s ease, background 0.2s ease, transform 0.15s ease;
        }

        #fsp-info-btn:hover {
            opacity: 1;
            transform: scale(1.06);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
        }

        #fsp-artist {
            font-size: clamp(14px, 1.6vw, 20px);
            opacity: 0.7;
            margin-bottom: 8px;
        }

        #fsp-lyrics-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            min-height: 28px;
        }

        #fsp-lyrics-hint {
            font-size: 12px;
            opacity: 0.45;
        }

        #fsp-lyrics-follow {
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 12px;
            color: #fff;
            background: linear-gradient(160deg, rgba(140, 168, 255, 0.38), rgba(255, 111, 174, 0.22));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--glass-inset);
            cursor: pointer;
        }

        #fsp-lyrics-follow.visible { display: inline-block; }

        #fsp-lyrics {
            position: relative;
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 12%, #000 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, #000 12%, #000 88%, transparent 100%);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
        }

        #fsp-lyrics::-webkit-scrollbar { width: 6px; }
        #fsp-lyrics::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 999px;
        }

        #fsp-lyrics-lines {
            padding: 42% 0;
        }

        .fsp-line {
            margin: 0;
            padding: 11px 4px;
            font-size: clamp(16px, 1.9vw, 24px);
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.42);
            transform-origin: left center;
            transform: scale(0.96);
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
            cursor: pointer;
        }

        .fsp-line.fsp-active {
            color: #fff;
            font-weight: 600;
            transform: scale(1.03);
            text-shadow: 0 1px 12px rgba(10, 132, 255, 0.35);
        }

        #fsp-lyrics-empty {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            text-align: center;
            opacity: 0.55;
            display: none;
        }

        #fsp.no-lyrics #fsp-lyrics-empty { display: block; }

        /* Bottom control bar — iOS 26 liquid glass dock */
        #fsp-bar {
            position: relative;
            z-index: 2;
            flex: 0 0 auto;
            width: calc(100% - (var(--fsp-gutter) * 2));
            margin: 0 auto max(12px, env(safe-area-inset-bottom));
            padding: 14px clamp(14px, 3.5vw, 24px) 12px;
            border-radius: var(--fsp-radius);
        }

        .fsp-progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-variant-numeric: tabular-nums;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .fsp-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.15);
            outline: none;
            cursor: pointer;
        }

        #fsp-seek {
            background-image: linear-gradient(var(--accent), var(--accent));
            background-repeat: no-repeat;
            background-size: 0% 100%;
        }

        .fsp-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(145deg, #fff, #dce8ff);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 10px rgba(140, 168, 255, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .fsp-range::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            background: linear-gradient(145deg, #fff, #dce8ff);
            box-shadow: 0 2px 10px rgba(140, 168, 255, 0.55);
        }

        .fsp-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: clamp(10px, 3vw, 34px);
            margin-top: 12px;
        }

        .fsp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            background: var(--glass-fill);
            border: 0.5px solid rgba(255, 255, 255, 0.16);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.92);
            cursor: pointer;
            padding: 8px;
            opacity: 0.95;
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            box-shadow: var(--glass-inset);
            transition: opacity 0.2s ease, transform 0.15s ease, background 0.2s ease;
        }

        .fsp-btn:hover {
            opacity: 1;
            transform: scale(1.06);
            background: var(--glass-fill-strong);
        }
        .fsp-btn svg { width: 26px; height: 26px; fill: currentColor; flex: 0 0 auto; }

        #fsp-play {
            width: 62px;
            height: 62px;
            min-width: 62px;
            min-height: 62px;
            flex: 0 0 62px;
            aspect-ratio: 1;
            padding: 0;
            border-radius: 50%;
            border: 0.5px solid rgba(255, 255, 255, 0.38);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.34) 0%, rgba(255, 255, 255, 0.14) 100%);
            backdrop-filter: blur(24px) saturate(190%);
            -webkit-backdrop-filter: blur(24px) saturate(190%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.55),
                0 8px 24px rgba(0, 0, 0, 0.18);
            opacity: 1;
        }

        #fsp-play:hover {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0.18) 100%);
        }

        #fsp-play svg { fill: rgba(255, 255, 255, 0.95); }

        #fsp-play svg { width: 30px; height: 30px; }

        .fsp-vol {
            display: flex;
            align-items: center;
            gap: 8px;
            width: clamp(90px, 12vw, 150px);
            flex: 0 1 auto;
            min-width: 0;
        }

        .fsp-vol svg { width: 22px; height: 22px; fill: #fff; opacity: 0.85; flex: 0 0 auto; }
        #fsp-vol-range { height: 5px; }

        .fsp-mode-label {
            position: absolute;
            font-size: 10px;
            font-weight: 700;
        }

        /* Playlist panel */
        #fsp-playlist {
            position: absolute;
            top: var(--fsp-gutter);
            right: var(--fsp-gutter);
            bottom: var(--fsp-gutter);
            width: min(380px, calc(100vw - (var(--fsp-gutter) * 2)));
            z-index: 3;
            border-radius: var(--fsp-radius);
            transform: translateX(calc(100% + var(--fsp-gutter)));
            transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            flex-direction: column;
        }

        #fsp-playlist.open { transform: translateX(0); }

        .fsp-pl-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 12px;
            font-size: 18px;
            font-weight: 700;
        }

        #fsp-pl-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            opacity: 0.7;
        }

        #fsp-pl-close:hover { opacity: 1; }

        #fsp-playlist-items {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 0 12px 20px;
        }

        .fsp-pl-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 16px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .fsp-pl-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .fsp-pl-item.active {
            background: linear-gradient(135deg, rgba(168, 196, 255, 0.28), rgba(255, 142, 196, 0.14));
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: var(--glass-inset);
        }

        .fsp-pl-item img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
            flex: 0 0 auto;
            background: #222;
        }

        .fsp-pl-meta { min-width: 0; }
        .fsp-pl-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fsp-pl-artist { font-size: 12px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fsp-pl-item.active .fsp-pl-name { color: var(--accent); }

        /* View mode: art only / lyrics only / both */
        #fsp-view-btn {
            position: relative;
        }

        #fsp-view-btn .fsp-view-label {
            position: absolute;
            bottom: -2px;
            right: -2px;
            font-size: 8px;
            font-weight: 700;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.12));
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            padding: 1px 4px;
            line-height: 1.2;
        }

        #fsp.fsp-view-art #fsp-side { display: none; }
        #fsp.fsp-view-art #fsp-main { justify-content: center; }

        #fsp.fsp-view-lyrics #fsp-art-wrap { display: none; }
        #fsp.fsp-view-lyrics #fsp-side {
            max-width: min(760px, calc(100vw - (var(--fsp-gutter) * 2)));
            text-align: center;
        }

        #fsp.fsp-view-lyrics .fsp-line { transform-origin: center; }

        /* Song / album / artist details */
        #fsp-details {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(8, 8, 16, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }

        #fsp-details.open {
            opacity: 1;
            visibility: visible;
        }

        #fsp-details-card {
            width: min(420px, calc(100vw - (var(--fsp-gutter) * 2)));
            max-height: min(78vh, 560px);
            overflow-y: auto;
            border-radius: var(--fsp-radius);
            padding: 22px 22px 18px;
        }

        #fsp-details-head {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 16px;
        }

        #fsp-details-cover {
            width: 88px;
            height: 88px;
            border-radius: 12px;
            object-fit: cover;
            flex: 0 0 auto;
            background: #222;
        }

        #fsp-details-title {
            margin: 0 0 4px;
            font-size: 22px;
            font-weight: 700;
        }

        #fsp-details-artist,
        #fsp-details-album {
            margin: 0 0 4px;
            font-size: 14px;
            opacity: 0.72;
        }

        #fsp-details-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #fff;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            opacity: 0.7;
        }

        #fsp-details-close:hover { opacity: 1; }

        .fsp-details-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .fsp-details-section h3 {
            margin: 0 0 10px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.55;
        }

        .fsp-details-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .fsp-details-links a {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            box-shadow: var(--glass-inset);
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .fsp-details-links a:hover {
            background: linear-gradient(160deg, rgba(168, 196, 255, 0.35), rgba(255, 142, 196, 0.18));
            border-color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 760px) {
            #fsp-main {
                flex-direction: column;
                gap: 14px;
                padding-top: 3vh;
                padding-left: var(--fsp-gutter);
                padding-right: var(--fsp-gutter);
            }

            #fsp-art { width: clamp(150px, 30vh, 220px); height: clamp(150px, 30vh, 220px); }

            #fsp-side {
                flex: 1 1 auto;
                align-self: stretch;
                width: 100%;
                max-width: 100%;
                height: auto;
                min-height: 0;
                text-align: center;
            }

            #fsp.fsp-view-lyrics #fsp-side { max-width: 100%; }

            .fsp-line { text-align: center; transform-origin: center; }

            #fsp-bar {
                width: calc(100% - (var(--fsp-gutter) * 2));
                padding-left: 14px;
                padding-right: 14px;
            }

            .fsp-controls { gap: 8px 12px; }
            .fsp-vol { width: 68px; }
            #fsp-play {
                width: 56px;
                height: 56px;
                min-width: 56px;
                min-height: 56px;
                flex: 0 0 56px;
            }
            #fsp-play svg { width: 26px; height: 26px; }
        }

        @media (max-width: 420px) {
            .fsp-vol { display: none; }
            .fsp-controls { gap: 6px 12px; }
        }
    </style>
</head>

<body>
    <div style="text-align:center">
        <div id="app"></div>
    </div>

    <div id="fsp">
        <div id="fsp-bg"></div>
        <div id="fsp-liquid" aria-hidden="true"><span></span><span></span><span></span></div>

        <div id="fsp-main">
            <div id="fsp-art-wrap">
                <div id="fsp-art"><img id="fsp-art-img" alt="cover" /></div>
            </div>
            <div id="fsp-side" class="fsp-glass">
                <div id="fsp-title-row">
                    <h1 id="fsp-title"></h1>
                    <button id="fsp-info-btn" type="button" title="歌曲详情" aria-label="歌曲详情">i</button>
                </div>
                <div id="fsp-artist"></div>
                <div id="fsp-lyrics-toolbar">
                    <span id="fsp-lyrics-hint">滚动浏览歌词，点击一句可跳转播放</span>
                    <button id="fsp-lyrics-follow" type="button">回到当前句</button>
                </div>
                <div id="fsp-lyrics">
                    <div id="fsp-lyrics-lines"></div>
                    <div id="fsp-lyrics-empty">暂无同步歌词</div>
                </div>
            </div>
        </div>

        <div id="fsp-bar" class="fsp-glass">
            <div class="fsp-progress-row">
                <span id="fsp-cur">00:00</span>
                <input id="fsp-seek" class="fsp-range" type="range" min="0" max="1000" value="0" aria-label="进度" />
                <span id="fsp-dur">00:00</span>
            </div>
            <div class="fsp-controls">
                <button id="fsp-mode" class="fsp-btn" type="button" title="播放模式"></button>
                <button id="fsp-prev" class="fsp-btn" type="button" title="上一首">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="fsp-play" class="fsp-btn" type="button" title="播放/暂停"></button>
                <button id="fsp-next" class="fsp-btn" type="button" title="下一首">
                    <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
                </button>
                <div class="fsp-vol">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4.03v8.06A4.5 4.5 0 0016.5 12z"/></svg>
                    <input id="fsp-vol-range" class="fsp-range" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="音量" />
                </div>
                <button id="fsp-view-btn" class="fsp-btn" type="button" title="显示模式：封面+歌词">
                    <svg viewBox="0 0 24 24"><path d="M4 5h7v7H4zm9 0h7v7h-7zM4 14h7v7H4zm9 0h7v7h-7z"/></svg>
                    <span class="fsp-view-label">全</span>
                </button>
                <button id="fsp-list-btn" class="fsp-btn" type="button" title="播放列表">
                    <svg viewBox="0 0 24 24"><path d="M3 6h13v2H3zm0 5h13v2H3zm0 5h9v2H3zm15-9l4 3-4 3z"/></svg>
                </button>
            </div>
        </div>

        <div id="fsp-details" role="dialog" aria-modal="true" aria-labelledby="fsp-details-title">
            <div id="fsp-details-card" class="fsp-glass">
                <div id="fsp-details-head">
                    <img id="fsp-details-cover" alt="" />
                    <div>
                        <h2 id="fsp-details-title"></h2>
                        <p id="fsp-details-artist"></p>
                        <p id="fsp-details-album"></p>
                    </div>
                    <button id="fsp-details-close" type="button" aria-label="关闭">&times;</button>
                </div>
                <div class="fsp-details-section">
                    <h3>了解更多</h3>
                    <div id="fsp-details-links" class="fsp-details-links"></div>
                </div>
            </div>
        </div>

        <div id="fsp-playlist" class="fsp-glass">
            <div class="fsp-pl-head">
                <span>播放列表</span>
                <button id="fsp-pl-close" type="button" aria-label="关闭">&times;</button>
            </div>
            <div id="fsp-playlist-items"></div>
        </div>
    </div>

    <script src="{{ '/assets/js/cplayer.js' | relative_url }}"></script>
    <script>
        let baseurl = '';
        {% if page.baseurl %}
        baseurl = '{{page.baseurl}}';
        {% endif %}
        let playlist = [];
        let promises = [];
        {% for details in page.playlist %}
        var tmp = (function () {
            var _lyric = '';
            var _sublyric = '';
            return new Promise(function (resolve) {
                $.get(baseurl + encodeURI(encodeURI("{{ details.lyric }}")), function (d, status) {
                    if (status == "success") { _lyric = d; }
                    resolve();
                }).error(function () { resolve(); });
            }).then(function () {
                {% if details.lyrictrans %}
                return new Promise(function (resolve) {
                    $.get(baseurl + encodeURI(encodeURI("{{ details.lyrictrans }}")), function (d2, status) {
                        if (status == "success") { _sublyric = d2; }
                        resolve();
                    }).error(function () { resolve(); });
                });
                {% else %}
                return Promise.resolve();
                {% endif %}
            }).then(function () {
                let songname = '{{ details.song }}'.split('/');
                songname = songname[songname.length - 1];
                playlist.push({
                    src: baseurl + encodeURI(encodeURI('{{ details.song }}')),
                    poster: baseurl + '{{ details.poster }}',
                    name: '{{ details.title }}' || songname.split('-')[1],
                    artist: '{{ details.artist }}' || songname.split('-')[0],
                    album: '{{ details.album }}' || '',
                    artist_url: '{{ details.artist_url }}' || '',
                    album_url: '{{ details.album_url }}' || '',
                    song_url: '{{ details.song_url }}' || '',
                    lyric: _lyric,
                    sublyric: _sublyric
                });
            });
        })();
        promises.push(tmp);
        {% endfor %}
        Promise.all(promises).then(function () {
            var trackData = playlist.map(function (it) {
                return {
                    name: it.name,
                    artist: it.artist,
                    album: it.album,
                    artist_url: it.artist_url,
                    album_url: it.album_url,
                    song_url: it.song_url,
                    poster: it.poster,
                    lyric: it.lyric,
                    src: it.src
                };
            });
            var player = new cplayer({ element: document.getElementById('app'), playlist: playlist, volume: 0.8 });
            initFullscreenPlayer(player, trackData);
        }).catch(function (err) {
            console.log("playlist init error", err);
        });

        function parseLrc(raw) {
            var out = [];
            if (!raw) return out;
            var tag = /\[(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?\]/g;
            raw.split(/\r?\n/).forEach(function (line) {
                tag.lastIndex = 0;
                var times = [];
                var m;
                while ((m = tag.exec(line))) {
                    var frac = m[3] ? parseInt((m[3] + '00').slice(0, 3), 10) / 1000 : 0;
                    times.push(parseInt(m[1], 10) * 60 + parseInt(m[2], 10) + frac);
                }
                var text = line.replace(tag, '').trim();
                if (!times.length || !text) return;
                times.forEach(function (t) { out.push({ time: t, text: text }); });
            });
            out.sort(function (a, b) { return a.time - b.time; });
            return out;
        }

        function fmtTime(sec) {
            if (!isFinite(sec) || sec < 0) sec = 0;
            sec = Math.floor(sec);
            var m = Math.floor(sec / 60), s = sec % 60;
            return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
        }

        var MODE_ICONS = {
            listloop: { svg: '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2z"/></svg>', title: '列表循环' },
            singlecycle: { svg: '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2z"/></svg><span class="fsp-mode-label">1</span>', title: '单曲循环' },
            listrandom: { svg: '<svg viewBox="0 0 24 24"><path d="M14.83 13.41l1.42-1.41 2.75 2.75V13h2v5h-5v-2h1.59zM4 6h3.17l3 3 1.42-1.41L8.24 4H4zm0 12h4.24l9.51-9.5V11h2V4h-7v2h1.59L4 16.17z"/></svg>', title: '随机播放' }
        };

        var VIEW_MODES = [
            { id: 'both', className: 'fsp-view-both', label: '全', title: '显示模式：封面 + 歌词' },
            { id: 'art', className: 'fsp-view-art', label: '封', title: '显示模式：仅封面' },
            { id: 'lyrics', className: 'fsp-view-lyrics', label: '词', title: '显示模式：仅歌词' }
        ];

        function initFullscreenPlayer(player, trackData) {
            var root = document.getElementById('fsp');
            var bg = document.getElementById('fsp-bg');
            var artBox = document.getElementById('fsp-art');
            var artImg = document.getElementById('fsp-art-img');
            var titleEl = document.getElementById('fsp-title');
            var artistEl = document.getElementById('fsp-artist');
            var linesBox = document.getElementById('fsp-lyrics-lines');
            var lyricsView = document.getElementById('fsp-lyrics');
            var lyricsFollowBtn = document.getElementById('fsp-lyrics-follow');
            var curEl = document.getElementById('fsp-cur');
            var durEl = document.getElementById('fsp-dur');
            var seek = document.getElementById('fsp-seek');
            var volRange = document.getElementById('fsp-vol-range');
            var playBtn = document.getElementById('fsp-play');
            var modeBtn = document.getElementById('fsp-mode');
            var viewBtn = document.getElementById('fsp-view-btn');
            var viewLabel = viewBtn.querySelector('.fsp-view-label');
            var infoBtn = document.getElementById('fsp-info-btn');
            var detailsPanel = document.getElementById('fsp-details');
            var detailsCover = document.getElementById('fsp-details-cover');
            var detailsTitle = document.getElementById('fsp-details-title');
            var detailsArtist = document.getElementById('fsp-details-artist');
            var detailsAlbum = document.getElementById('fsp-details-album');
            var detailsLinks = document.getElementById('fsp-details-links');
            var plPanel = document.getElementById('fsp-playlist');
            var plItems = document.getElementById('fsp-playlist-items');

            var PLAY_SVG = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            var PAUSE_SVG = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';

            var lyrics = [];
            var lineEls = [];
            var activeIdx = -1;
            var duration = 0;
            var seeking = false;
            var curIdx = 0;
            var lyricsFollow = true;
            var viewModeIdx = 0;
            var scrollIdleTimer = null;

            function searchUrl(service, query) {
                if (!query) return '';
                var q = encodeURIComponent(query);
                if (service === 'wiki') return 'https://zh.wikipedia.org/wiki/Special:Search?search=' + q;
                if (service === 'spotify') return 'https://open.spotify.com/search/' + q;
                if (service === 'apple') return 'https://music.apple.com/search?term=' + q;
                return '';
            }

            function setViewMode(idx) {
                viewModeIdx = (idx + VIEW_MODES.length) % VIEW_MODES.length;
                var mode = VIEW_MODES[viewModeIdx];
                VIEW_MODES.forEach(function (m) { root.classList.remove(m.className); });
                root.classList.add(mode.className);
                viewLabel.textContent = mode.label;
                viewBtn.title = mode.title;
            }

            function centerActiveLine(smooth) {
                var el = lineEls[activeIdx];
                if (!el || !lyricsView) return;
                var target = el.offsetTop + el.clientHeight / 2 - lyricsView.clientHeight / 2;
                if (smooth && lyricsView.scrollTo) {
                    lyricsView.scrollTo({ top: target, behavior: 'smooth' });
                } else {
                    lyricsView.scrollTop = target;
                }
            }

            function setLyricsFollow(on) {
                lyricsFollow = on;
                lyricsFollowBtn.classList.toggle('visible', !on);
                if (on) centerActiveLine(true);
            }

            // The cplayer facade exposes `nowplaypoint` (getter), not nowpoint().
            // Resolve the index robustly by matching the current source URL.
            function indexBySrc(src) {
                if (src) {
                    for (var i = 0; i < trackData.length; i++) {
                        if (trackData[i].src === src) return i;
                    }
                }
                if (typeof player.nowplaypoint === 'number') return player.nowplaypoint;
                return curIdx;
            }

            function setActive(idx) {
                if (idx === activeIdx) return;
                if (lineEls[activeIdx]) lineEls[activeIdx].classList.remove('fsp-active');
                activeIdx = idx;
                var el = lineEls[idx];
                if (!el) return;
                el.classList.add('fsp-active');
                if (lyricsFollow) centerActiveLine(true);
            }

            function openDetails() {
                var d = trackData[curIdx] || {};
                detailsTitle.textContent = d.name || '';
                detailsArtist.textContent = d.artist ? '歌手：' + d.artist : '';
                detailsAlbum.textContent = d.album ? '专辑：' + d.album : '';
                detailsArtist.style.display = d.artist ? '' : 'none';
                detailsAlbum.style.display = d.album ? '' : 'none';
                if (d.poster) detailsCover.src = d.poster;
                detailsCover.style.display = d.poster ? '' : 'none';

                detailsLinks.innerHTML = '';
                function addLink(href, label) {
                    if (!href) return;
                    var a = document.createElement('a');
                    a.href = href;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = label;
                    detailsLinks.appendChild(a);
                }

                addLink(d.song_url, '歌曲页面');
                addLink(d.artist_url, '歌手主页');
                addLink(d.album_url, '专辑页面');
                addLink(searchUrl('wiki', d.artist), '维基百科 · 歌手');
                addLink(searchUrl('wiki', (d.name || '') + ' ' + (d.artist || '')), '维基百科 · 歌曲');
                addLink(searchUrl('spotify', (d.name || '') + ' ' + (d.artist || '')), 'Spotify 搜索');
                addLink(searchUrl('apple', (d.name || '') + ' ' + (d.artist || '')), 'Apple Music 搜索');

                if (!detailsLinks.children.length) {
                    var empty = document.createElement('span');
                    empty.style.opacity = '0.55';
                    empty.style.fontSize = '13px';
                    empty.textContent = '暂无更多链接，可在歌单数据里补充 artist_url / album_url / song_url。';
                    detailsLinks.appendChild(empty);
                }

                detailsPanel.classList.add('open');
            }

            function closeDetails() {
                detailsPanel.classList.remove('open');
            }

            function syncLyrics(t) {
                if (!lyrics.length) return;
                var idx = 0;
                for (var i = 0; i < lyrics.length; i++) {
                    if (lyrics[i].time <= t + 0.15) { idx = i; } else { break; }
                }
                setActive(idx);
            }

            function loadTrack(idx) {
                curIdx = idx;
                var d = trackData[idx] || {};
                titleEl.textContent = d.name || '';
                artistEl.textContent = d.artist || '';
                if (d.poster) {
                    artImg.src = d.poster;
                    bg.style.backgroundImage = 'url("' + d.poster + '")';
                }
                lyrics = parseLrc(d.lyric);
                linesBox.innerHTML = '';
                lineEls = [];
                activeIdx = -1;
                if (!lyrics.length) {
                    root.classList.add('no-lyrics');
                    lyricsView.scrollTop = 0;
                } else {
                    root.classList.remove('no-lyrics');
                    lyrics.forEach(function (item, i) {
                        var p = document.createElement('p');
                        p.className = 'fsp-line';
                        p.textContent = item.text;
                        p.addEventListener('click', function () {
                            setLyricsFollow(true);
                            if (player.setCurrentTime) player.setCurrentTime(item.time);
                            if (!player.isPlaying()) player.play();
                        });
                        linesBox.appendChild(p);
                        lineEls.push(p);
                    });
                    setLyricsFollow(true);
                    setActive(0);
                }
                highlightPlaylist(idx);
                closeDetails();
            }

            function updatePlayIcon(playing) {
                playBtn.innerHTML = playing ? PAUSE_SVG : PLAY_SVG;
                if (playing) { artBox.classList.add('playing'); }
                else { artBox.classList.remove('playing'); }
            }

            function updateMode() {
                var name = player.mode || (player.getMode && player.getMode()) || 'listloop';
                var info = MODE_ICONS[name] || MODE_ICONS.listloop;
                modeBtn.innerHTML = info.svg;
                modeBtn.title = info.title;
            }

            function buildPlaylist() {
                plItems.innerHTML = '';
                trackData.forEach(function (d, i) {
                    var item = document.createElement('div');
                    item.className = 'fsp-pl-item';
                    item.dataset.idx = i;
                    var img = document.createElement('img');
                    if (d.poster) img.src = d.poster;
                    var meta = document.createElement('div');
                    meta.className = 'fsp-pl-meta';
                    var nm = document.createElement('div');
                    nm.className = 'fsp-pl-name';
                    nm.textContent = d.name || ('曲目 ' + (i + 1));
                    var ar = document.createElement('div');
                    ar.className = 'fsp-pl-artist';
                    ar.textContent = d.artist || '';
                    meta.appendChild(nm);
                    meta.appendChild(ar);
                    item.appendChild(img);
                    item.appendChild(meta);
                    item.addEventListener('click', function () {
                        // openAudio() auto-resumes when already playing; only
                        // trigger play() ourselves if the player was paused,
                        // otherwise a second play() during the load throws AbortError.
                        var wasPlaying = player.isPlaying();
                        player.to(i);
                        if (!wasPlaying) player.play();
                    });
                    plItems.appendChild(item);
                });
            }

            function highlightPlaylist(idx) {
                var items = plItems.children;
                for (var i = 0; i < items.length; i++) {
                    items[i].classList.toggle('active', i === idx);
                }
            }

            // Events
            player.on('timeupdate', function (t, dur) {
                if (dur) duration = dur;
                curEl.textContent = fmtTime(t);
                durEl.textContent = fmtTime(duration);
                if (!seeking && duration) {
                    var ratio = Math.min(1, t / duration);
                    seek.value = Math.round(ratio * 1000);
                    seek.style.backgroundSize = (ratio * 100) + '% 100%';
                }
                syncLyrics(t);
            });
            player.on('openaudio', function (track) {
                duration = 0;
                seek.value = 0;
                seek.style.backgroundSize = '0% 100%';
                loadTrack(indexBySrc(track && track.src));
                if (player.audioElement) syncLyrics(player.audioElement.currentTime || 0);
            });
            player.on('playstatechange', function (paused) { updatePlayIcon(!paused); });
            player.on('play', function () { updatePlayIcon(true); });
            player.on('pause', function () { updatePlayIcon(false); });
            player.on('playmodechange', updateMode);
            player.on('volumechange', function () {
                var v = player.audioElement ? player.audioElement.volume : 0.8;
                if (!volDragging) volRange.value = v;
            });

            // Controls
            playBtn.addEventListener('click', function () { player.togglePlayState(); });
            document.getElementById('fsp-prev').addEventListener('click', function () { player.prev(); });
            document.getElementById('fsp-next').addEventListener('click', function () { player.next(); });
            modeBtn.addEventListener('click', function () { player.toggleMode(); updateMode(); });

            seek.addEventListener('input', function () {
                seeking = true;
                var ratio = seek.value / 1000;
                seek.style.backgroundSize = (ratio * 100) + '% 100%';
                if (duration) curEl.textContent = fmtTime(ratio * duration);
            });
            seek.addEventListener('change', function () {
                var ratio = seek.value / 1000;
                if (duration && player.setCurrentTime) player.setCurrentTime(ratio * duration);
                seeking = false;
            });

            var volDragging = false;
            volRange.addEventListener('input', function () {
                volDragging = true;
                player.setVolume(parseFloat(volRange.value));
            });
            volRange.addEventListener('change', function () { volDragging = false; });

            document.getElementById('fsp-list-btn').addEventListener('click', function () { plPanel.classList.add('open'); });
            document.getElementById('fsp-pl-close').addEventListener('click', function () { plPanel.classList.remove('open'); });
            viewBtn.addEventListener('click', function () { setViewMode(viewModeIdx + 1); });
            infoBtn.addEventListener('click', openDetails);
            document.getElementById('fsp-details-close').addEventListener('click', closeDetails);
            detailsPanel.addEventListener('click', function (e) {
                if (e.target === detailsPanel) closeDetails();
            });
            lyricsFollowBtn.addEventListener('click', function () { setLyricsFollow(true); });
            lyricsView.addEventListener('wheel', function () { setLyricsFollow(false); }, { passive: true });
            lyricsView.addEventListener('touchstart', function () { setLyricsFollow(false); }, { passive: true });
            lyricsView.addEventListener('scroll', function () {
                if (!lyricsFollow) {
                    clearTimeout(scrollIdleTimer);
                    scrollIdleTimer = setTimeout(function () {
                        lyricsFollowBtn.classList.add('visible');
                    }, 120);
                }
            }, { passive: true });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    plPanel.classList.remove('open');
                    closeDetails();
                }
                if (e.code === 'Space' && e.target === document.body) {
                    e.preventDefault();
                    player.togglePlayState();
                }
            });
            window.addEventListener('resize', function () {
                if (lyricsFollow && lineEls[activeIdx]) centerActiveLine(false);
            });

            // Swallow the harmless "play() interrupted by a new load/pause"
            // AbortError that fires when rapidly switching tracks.
            window.addEventListener('unhandledrejection', function (e) {
                if (e.reason && e.reason.name === 'AbortError') e.preventDefault();
            });

            // Initial render
            buildPlaylist();
            setViewMode(0);
            updateMode();
            updatePlayIcon(player.isPlaying());
            volRange.value = player.audioElement ? player.audioElement.volume : 0.8;
            loadTrack(indexBySrc(player.audioElement && player.audioElement.src));
        }
    </script>
</body>

</html>
